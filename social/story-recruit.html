<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Social: Story / Recruit (1080×1920)</title>
<link rel="stylesheet" href="../css/styles.css" />
<style>
  html, body { margin: 0; }
  .post { width: 1080px; height: 1920px; position: relative; overflow: hidden; font-family: var(--font-primary); color: #fff; background: linear-gradient(180deg, var(--rotary-royal-blue) 0%, #0a3a72 100%); }
  .glow { position: absolute; top: 320px; left: 50%; transform: translateX(-50%); width: 900px; height: 900px; border-radius: 50%; background: radial-gradient(circle, rgba(0,162,224,0.4), transparent 68%); }
  .inner { position: relative; padding: 130px 96px 120px; height: 100%; box-sizing: border-box; display: flex; flex-direction: column; text-align: center; align-items: center; }
  .brand { font-size: 40px; font-weight: 800; }
  .brand .dot { color: var(--sky-blue); }
  .club { font-size: 20px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.16em; color: rgba(255,255,255,0.72); margin-top: 8px; }
  .kicker { margin-top: 200px; font-size: 30px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.14em; color: var(--rotary-gold); }
  h1 { font-size: 120px; font-weight: 800; letter-spacing: -0.03em; line-height: 0.95; margin: 34px 0 0; }
  p { font-family: var(--font-secondary); font-size: 42px; line-height: 1.5; color: rgba(255,255,255,0.9); margin: 44px 0 0; max-width: 800px; }
  .cta { margin-top: auto; background: var(--rotary-gold); color: var(--ink-900); font-size: 40px; font-weight: 800; padding: 34px 70px; border-radius: var(--radius-pill); }
  .swipe { margin-top: 40px; font-size: 26px; font-weight: 600; color: rgba(255,255,255,0.8); letter-spacing: 0.05em; }
</style>
</head>
<body>
  <div class="post">
    <div class="glow"></div>
    <div class="inner">
      <div>
        <div class="brand">Interact<span class="dot">.</span></div>
        <div class="club">Club of Chinatown</div>
      </div>
      <div class="kicker">Now recruiting</div>
      <h1>Serve your<br />neighborhood.</h1>
      <p>Students 12–18, join a crew that shows up for Chinatown. Membership is free.</p>
      <div class="cta">Join the club</div>
      <div class="swipe">↑ Link in bio to sign up</div>
    </div>
  </div>
</body>
</html>
