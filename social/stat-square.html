<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Social — Impact Stat (1080×1080)</title>
<link rel="stylesheet" href="../css/styles.css" />
<style>
  html, body { margin: 0; }
  .post { width: 1080px; height: 1080px; position: relative; overflow: hidden; font-family: var(--font-primary); background: var(--surface-brand-soft); color: var(--text-heading); }
  .inner { padding: 96px 90px; height: 100%; box-sizing: border-box; display: flex; flex-direction: column; }
  .top { display: flex; align-items: center; justify-content: space-between; }
  .brand { font-size: 30px; font-weight: 800; color: var(--rotary-royal-blue); }
  .brand .dot { color: var(--sky-blue); }
  .tag { padding: 10px 22px; border-radius: var(--radius-pill); background: var(--rotary-royal-blue); color: #fff; font-size: 18px; font-weight: 700; letter-spacing: 0.02em; }
  .eyebrow { margin-top: 90px; font-size: 26px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: var(--brand); }
  .big { font-size: 300px; font-weight: 800; letter-spacing: -0.04em; line-height: 0.86; color: var(--rotary-royal-blue); margin: 18px 0 0; }
  .big .u { color: var(--rotary-gold); }
  .sub { font-size: 44px; font-weight: 700; line-height: 1.15; margin-top: 24px; max-width: 760px; }
  .foot { margin-top: auto; font-family: var(--font-secondary); font-size: 30px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="post">
    <div class="inner">
      <div class="top">
        <div class="brand">Interact<span class="dot">.</span></div>
        <div class="tag">2025 Impact</div>
      </div>
      <div class="eyebrow">Together this year</div>
      <div class="big">2,400<span class="u">+</span></div>
      <div class="sub">volunteer hours given back to Chinatown.</div>
      <div class="foot">Interact Club of Chinatown · A branch of Rotary International</div>
    </div>
  </div>
</body>
</html>
